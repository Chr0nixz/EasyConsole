name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-desktop:
    name: Release ${{ matrix.artifact-suffix }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifact-suffix: windows-x64
            args: ""
            rust-targets: ""
          - platform: ubuntu-22.04
            artifact-suffix: linux-x64
            args: ""
            rust-targets: ""
          - platform: macos-latest
            artifact-suffix: macos-arm64
            args: "--target aarch64-apple-darwin"
            rust-targets: "aarch64-apple-darwin"
          - platform: macos-latest
            artifact-suffix: macos-x64
            args: "--target x86_64-apple-darwin"
            rust-targets: "x86_64-apple-darwin"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.rust-targets != ''
        run: rustup target add ${{ matrix.rust-targets }}

      - name: Install Linux Tauri dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            file

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: |
          npm run typecheck
          npm run typecheck:tools
          npm run lint
          npm run test

      - name: Build desktop bundle
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.run_number) }}
          releaseName: EasyConsole ${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.run_number) }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload sidecar artifacts
        uses: actions/upload-artifact@v4
        with:
          name: easy-console-sidecars-${{ matrix.artifact-suffix }}
          path: build/sidecars/*

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: easy-console-desktop-${{ matrix.artifact-suffix }}
          path: |
            src-tauri/target/**/release/EasyConsole*
            src-tauri/target/**/release/bundle/**
            build/sidecars/*
