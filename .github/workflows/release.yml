name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-desktop:
    name: Release ${{ matrix.artifact-suffix }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifact-suffix: windows-x64
            args: ""
            rust-targets: ""
          - platform: ubuntu-22.04
            artifact-suffix: linux-x64
            args: ""
            rust-targets: ""
          - platform: macos-latest
            artifact-suffix: macos-arm64
            args: "--target aarch64-apple-darwin"
            rust-targets: "aarch64-apple-darwin"
          - platform: macos-latest
            artifact-suffix: macos-x64
            args: "--target x86_64-apple-darwin"
            rust-targets: "x86_64-apple-darwin"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.rust-targets != ''
        run: rustup target add ${{ matrix.rust-targets }}

      - name: Install Linux Tauri dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            file

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: |
          npm run version:check
          npm run typecheck
          npm run typecheck:tools
          npm run lint
          npm run test

      - name: Build desktop bundle
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.run_number) }}
          releaseName: EasyConsole ${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.run_number) }}
          releaseDraft: true
          prerelease: ${{ github.ref_type != 'tag' }}
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

      - name: Upload sidecar artifacts
        uses: actions/upload-artifact@v4
        with:
          name: easy-console-sidecars-${{ matrix.artifact-suffix }}
          path: build/sidecars/*

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: easy-console-desktop-${{ matrix.artifact-suffix }}
          path: |
            src-tauri/target/**/release/EasyConsole*
            src-tauri/target/**/release/bundle/**
            build/sidecars/*

  release-android:
    name: Release Android (aarch64)
    needs: release-desktop
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and set environment
        run: |
          sdkmanager "ndk;27.0.12077973"
          NDK_HOME="$ANDROID_HOME/ndk/27.0.12077973"
          echo "NDK_HOME=$NDK_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$NDK_HOME" >> $GITHUB_ENV

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-android-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-android-

      - name: Install dependencies
        run: npm ci

      - name: Verify gen/android exists
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            echo "::error::src-tauri/gen/android/ not found. Run 'npm run tauri:android:init' locally and commit the result."
            exit 1
          fi

      - name: Build Android APK
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
          CC_aarch64_linux_android: ${{ env.NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang
          AR_aarch64_linux_android: ${{ env.NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ env.NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang
        run: npx tauri android build --target aarch64 --apk

      - name: Upload APK to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.run_number) }}"
          APK_PATH=$(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" "EasyConsole-${TAG}-android-aarch64.apk"
            gh release upload "$TAG" "EasyConsole-${TAG}-android-aarch64.apk" --clobber
          else
            echo "::warning::No APK found"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: easy-console-android-aarch64
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
