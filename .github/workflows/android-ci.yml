name: Android CI

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-android:
    name: Android (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64
            rust-target: aarch64-linux-android
            cc-env: aarch64_linux_android
            cc-suffix: aarch64-linux-android24
            linker-env: CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER
          - target: x86_64
            rust-target: x86_64-linux-android
            cc-env: x86_64_linux_android
            cc-suffix: x86_64-linux-android24
            linker-env: CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and set environment
        run: |
          sdkmanager "ndk;27.0.12077973"
          NDK_HOME="$ANDROID_HOME/ndk/27.0.12077973"
          echo "NDK_HOME=$NDK_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$NDK_HOME" >> $GITHUB_ENV

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-android-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-android-${{ matrix.target }}-

      - name: Install dependencies
        run: npm ci

      - name: Verify gen/android exists
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            echo "::error::src-tauri/gen/android/ not found. Run 'npm run tauri:android:init' locally and commit the result."
            exit 1
          fi

      - name: Cargo check for Android target
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
        run: |
          export CC_${{ matrix.cc-env }}="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.cc-suffix }}-clang"
          export AR_${{ matrix.cc-env }}="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          export ${{ matrix.linker-env }}="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.cc-suffix }}-clang"
          cargo check --manifest-path src-tauri/Cargo.toml --target ${{ matrix.rust-target }}

      - name: Build Android APK
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
        run: |
          export CC_${{ matrix.cc-env }}="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.cc-suffix }}-clang"
          export AR_${{ matrix.cc-env }}="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          export ${{ matrix.linker-env }}="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.cc-suffix }}-clang"
          npx tauri android build --target ${{ matrix.target }} --apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: easy-console-android-${{ matrix.target }}
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
