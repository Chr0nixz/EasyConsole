name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify:
    name: Verify (${{ matrix.artifact-suffix }})
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifact-suffix: windows-x64
          - platform: macos-latest
            artifact-suffix: macos-arm64
          - platform: ubuntu-22.04
            artifact-suffix: linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux Tauri dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl \
            build-essential \
            libssl-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            file

      - name: Install dependencies
        run: npm ci

      - name: Check versions
        run: npm run version:check

      - name: Typecheck app
        run: npm run typecheck

      - name: Typecheck tools
        run: npm run typecheck:tools

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build desktop inputs
        run: npm run build:desktop

      - name: Check Tauri shell
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Upload sidecar artifacts
        uses: actions/upload-artifact@v4
        with:
          name: easy-console-sidecars-${{ matrix.artifact-suffix }}
          path: build/sidecars/*
