name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify:
    name: Verify
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Typecheck app
        run: npm run typecheck

      - name: Typecheck tools
        run: npm run typecheck:tools

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build sidecars
        run: npm run build:sidecars

      - name: Build web app
        run: npm run build

      - name: Upload sidecar artifacts
        uses: actions/upload-artifact@v4
        with:
          name: easy-console-sidecars-windows-x64
          path: build/sidecars/*.exe
